services:
  - type: web
    name: intranet-general-minsa
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: VITE_VERIFICATION_BASE_URL
        value: https://portalwebminsa-certificados.onrender.com
      - key: API_SHARED_KEY
        sync: false
      - key: MEDICAL_API_BASE_URL
        value: https://intranet-api.alisadata.lat
      - key: BOT_FILES_BASE_URL
        value: https://intranet-files.alisadata.lat
      - key: API_USAGE_LOG_PATH
        value: /var/data/api-usage.log
      - key: API_ENABLE_DOCUMENT_GENERATION
        value: false
      - key: API_ENABLE_DEMO_ENDPOINTS
        value: false
