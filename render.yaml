services:
  - type: web
    name: intranet-general-minsa
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: VITE_VERIFICATION_BASE_URL
        value: https://portalwebminsa-certificados.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: PGSSLMODE
        value: require
      - key: API_ADMIN_TOKEN
        sync: false
      - key: VITE_MEDICO_USUARIO
        sync: false
      - key: VITE_MEDICO_CLAVE
        sync: false
      - key: VITE_MEDICO_NOMBRE
        sync: false
      - key: VITE_MEDICO_CMP
        sync: false
      - key: MEDICAL_API_BASE_URL
        value: https://intranet-api.alisadata.lat
      - key: BOT_FILES_BASE_URL
        value: https://intranet-files.alisadata.lat
      - key: API_DAILY_CREDITS
        value: 50
      - key: API_RATE_LIMIT_PER_MINUTE
        value: 60
      - key: API_ENABLE_DOCUMENT_GENERATION
        value: false
      - key: API_ENABLE_DEMO_ENDPOINTS
        value: false
